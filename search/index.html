              "blog-2023-custom-blockquotes": {
                "title": "a post with custom blockquotes",
                "author": "",

                "content": "This post shows how to add custom styles for blockquotes. Based on jekyll-gitbook implementation.We decided to support the same custom blockquotes as in jekyll-gitbook, which are also found in a lot of other sites’ styles. The styles definitions can be found on the _base.scss file, more specifically:/* Tips, warnings, and dangers */.post .post-content blockquote {    &.block-tip {    border-color: var(--global-tip-block);    background-color: var(--global-tip-block-bg);    p {      color: var(--global-tip-block-text);    }    h1, h2, h3, h4, h5, h6 {      color: var(--global-tip-block-title);    }  }  &.block-warning {    border-color: var(--global-warning-block);    background-color: var(--global-warning-block-bg);    p {      color: var(--global-warning-block-text);    }    h1, h2, h3, h4, h5, h6 {      color: var(--global-warning-block-title);    }  }  &.block-danger {    border-color: var(--global-danger-block);    background-color: var(--global-danger-block-bg);    p {      color: var(--global-danger-block-text);    }    h1, h2, h3, h4, h5, h6 {      color: var(--global-danger-block-title);    }  }}A regular blockquote can be used as following:> This is a regular blockquote> and it can be used as usual  This is a regular blockquoteand it can be used as usualThese custom styles can be used by adding the specific class to the blockquote, as follows:> ##### TIP>> A tip can be used when you want to give advice> related to a certain content.{: .block-tip }  TIP  A tip can be used when you want to give advicerelated to a certain content.> ##### WARNING>> This is a warning, and thus should> be used when you want to warn the user{: .block-warning }  WARNING  This is a warning, and thus shouldbe used when you want to warn the user> ##### DANGER>> This is a danger zone, and thus should> be used carefully{: .block-danger }  DANGER  This is a danger zone, and thus shouldbe used carefully",

              "blog-2023-tables": {
                "title": "displaying beautiful tables with Bootstrap Tables",
                "author": "",
                "category": "",
                "content": "Using markdown to display tables is easy. Just use the following syntax:| Left aligned | Center aligned | Right aligned || :----------- | :------------: | ------------: || Left 1       | center 1       | right 1       || Left 2       | center 2       | right 2       || Left 3       | center 3       | right 3       |That will generate:            Left aligned      Center aligned      Right aligned                  Left 1      center 1      right 1              Left 2      center 2      right 2              Left 3      center 3      right 3      It is also possible to use HTML to display tables. For example, the following HTML code will display a table with Bootstrap Table, loaded from a JSON file:<table  id=\"table\"  data-toggle=\"table\"  data-url=\"{{ '/assets/json/table_data.json' | relative_url }}\">  <thead>    <tr>      <th data-field=\"id\">ID</th>      <th data-field=\"name\">Item Name</th>      <th data-field=\"price\">Item Price</th>    </tr>  </thead></table>            ID      Item Name      Item Price      By using Bootstrap Table it is possible to create pretty complex tables, with pagination, search, and more. For example, the following HTML code will display a table, loaded from a JSON file, with pagination, search, checkboxes, and header/content alignment. For more information, check the documentation.<table  data-click-to-select=\"true\"  data-height=\"460\"  data-pagination=\"true\"  data-search=\"true\"  data-toggle=\"table\"  data-url=\"{{ '/assets/json/table_data.json' | relative_url }}\">  <thead>    <tr>      <th data-checkbox=\"true\"></th>      <th data-field=\"id\" data-halign=\"left\" data-align=\"center\" data-sortable=\"true\">ID</th>      <th data-field=\"name\" data-halign=\"center\" data-align=\"right\" data-sortable=\"true\">Item Name</th>      <th data-field=\"price\" data-halign=\"right\" data-align=\"left\" data-sortable=\"true\">Item Price</th>    </tr>  </thead></table>                  ID      Item Name      Item Price      ",

              "blog-2021-distill": {
                "title": "a distill-style blog post",
                "author": "",
                "category": "",
                "content": "EquationsThis theme supports rendering beautiful math in inline and display modes using MathJax 3 engine.You just need to surround your math expression with $$, like $$ E = mc^2 $$.If you leave it inside a paragraph, it will produce an inline expression, just like \\(E = mc^2\\).To use display mode, again surround your expression with $$ and place it as a separate paragraph.Here is an example:\\[\\left( \\sum_{k=1}^n a_k b_k \\right)^2 \\leq \\left( \\sum_{k=1}^n a_k^2 \\right) \\left( \\sum_{k=1}^n b_k^2 \\right)\\]Note that MathJax 3 is a major re-write of MathJax that brought a significant improvement to the loading and rendering speed, which is now on par with KaTeX.CitationsCitations are then used in the article body with the <d-cite> tag.The key attribute is a reference to the id provided in the bibliography.The key attribute can take multiple ids, separated by commas.The citation is presented inline like this:  (a number that displays more information on hover).If you have an appendix, a bibliography is automatically created and populated in it.Distill chose a numerical inline citation style to improve readability of citation dense articles and because many of the benefits of longer citations are obviated by displaying more information on hover.However, we consider it good style to mention author last names if you discuss something at length and it fits into the flow well — the authors are human and it’s nice for them to have the community associate them with their work.FootnotesJust wrap the text you would like to show up in a footnote in a <d-footnote> tag.The number of the footnote will be automatically generated.This will become a hoverable footnote.Code BlocksSyntax highlighting is provided within <d-code> tags.An example of inline code snippets: <d-code language=\"html\">let x = 10;</d-code>.For larger blocks of code, add a block attribute:  var x = 25;  function(x) {    return x * x;  }Note: <d-code> blocks do not look good in the dark mode.You can always use the default code-highlight using the highlight liquid tag:var x = 25;function(x) {  return x * x;}Interactive PlotsYou can add interative plots using plotly + iframes <img class="emoji" title=":framed_picture:" alt=":framed_picture:" src="https://github.githubassets.com/images/icons/emoji/unicode/1f5bc.png" height="20" width="20">  The plot must be generated separately and saved into an HTML file.To generate the plot that you see above, you can use the following code snippet:import pandas as pdimport plotly.express as pxdf = pd.read_csv(  'https://raw.githubusercontent.com/plotly/datasets/master/earthquakes-23k.csv')fig = px.density_mapbox(  df,  lat='Latitude',  lon='Longitude',  z='Magnitude',  radius=10,  center=dict(lat=0, lon=180),  zoom=0,  mapbox_style=\"stamen-terrain\",)fig.show()fig.write_html('assets/plotly/demo.html')Details boxesDetails boxes are collapsible boxes which hide additional information from the user. They can be added with the details liquid tag:Click here to know moreAdditional details, where math \\(2x - 1\\) and code is rendered correctly.LayoutsThe main text column is referred to as the body.It is the assumed layout of any direct descendants of the d-article element.  .l-bodyFor images you want to display a little larger, try .l-page:  .l-pageAll of these have an outset variant if you want to poke out from the body text a little bit.For instance:  .l-body-outset  .l-page-outsetOccasionally you’ll want to use the full browser width.For this, use .l-screen.You can also inset the element a little from the edge of the browser by using the inset variant.  .l-screen  .l-screen-insetThe final layout is for marginalia, asides, and footnotes.It does not interrupt the normal flow of .l-body sized text except on mobile screen sizes.  .l-gutterOther Typography?Emphasis, aka italics, with asterisks (*asterisks*) or underscores (_underscores_).Strong emphasis, aka bold, with asterisks or underscores.Combined emphasis with asterisks and underscores.Strikethrough uses two tildes. Scratch this.  First ordered list item  Another item⋅⋅* Unordered sub-list.  Actual numbers don’t matter, just that it’s a number⋅⋅1. Ordered sub-list  And another item.⋅⋅⋅You can have properly indented paragraphs within list items. Notice the blank line above, and the leading spaces (at least one, but we’ll use three here to also align the raw Markdown).⋅⋅⋅To have a line break without a paragraph, you will need to use two trailing spaces.⋅⋅⋅⋅⋅Note that this line is separate, but within the same paragraph.⋅⋅⋅⋅⋅(This is contrary to the typical GFM line break behaviour, where trailing spaces are not required.)  Unordered list can use asterisks  Or minuses  Or plusesI’m an inline-style linkI’m an inline-style link with titleI’m a reference-style linkI’m a relative reference to a repository fileYou can use numbers for reference-style link definitionsOr leave it empty and use the link text itself.URLs and URLs in angle brackets will automatically get turned into links.http://www.example.com or http://www.example.com and sometimesexample.com (but not on Github, for example).Some text to show that the reference links can follow later.Here’s our logo (hover to see the title text):Inline-style:Reference-style:Inline code has back-ticks around it.var s = \"JavaScript syntax highlighting\";alert(s);s = \"Python syntax highlighting\"print sNo language indicated, so no syntax highlighting.But let's throw in a <b>tag</b>.Colons can be used to align columns.            Tables      Are      Cool                  col 3 is      right-aligned      $1600              col 2 is      centered      $12              zebra stripes      are neat      $1      There must be at least 3 dashes separating each header cell.The outer pipes (|) are optional, and you don’t need to make theraw Markdown line up prettily. You can also use inline Markdown.            Markdown      Less      Pretty                  Still      renders      nicely              1      2      3        Blockquotes are very handy in email to emulate reply text.This line is part of the same quote.Quote break.  This is a very long line that will still be quoted properly when it wraps. Oh boy let’s keep writing to make sure this is long enough to actually wrap for everyone. Oh, you can put Markdown into a blockquote.Here’s a line for us to start with.This line is separated from the one above by two newlines, so it will be a separate paragraph.This line is also a separate paragraph, but…This line is only separated by a single newline, so it’s a separate line in the same paragraph.",
                "url": "/blog/2021/distill/"
              }

              "blog-2015-math": {
                "title": "a post with math",
                "author": "",
                "category": "",
                "content": "This theme supports rendering beautiful math in inline and display modes using MathJax 3 engine. You just need to surround your math expression with $$, like $$ E = mc^2 $$. If you leave it inside a paragraph, it will produce an inline expression, just like \\(E = mc^2\\).To use display mode, again surround your expression with $$ and place it as a separate paragraph. Here is an example:\\[\\sum_{k=1}^\\infty |\\langle x, e_k \\rangle|^2 \\leq \\|x\\|^2\\]You can also use \\begin{equation}...\\end{equation} instead of $$ for display mode math.MathJax will automatically number equations:\\begin{equation}\\label{eq:cauchy-schwarz}\\left( \\sum_{k=1}^n a_k b_k \\right)^2 \\leq \\left( \\sum_{k=1}^n a_k^2 \\right) \\left( \\sum_{k=1}^n b_k^2 \\right)\\end{equation}and by adding \\label{...} inside the equation environment, we can now refer to the equation using \\eqref.Note that MathJax 3 is a major re-write of MathJax that brought a significant improvement to the loading and rendering speed, which is now on par with KaTeX.",
                "url": "/blog/2015/math/"
              }

<!-- Scrolling Progress Bar -->
<script type="text/javascript">
  /*
   * This JavaScript code has been adapted from the article 
   * https://css-tricks.com/reading-position-indicator/ authored by Pankaj Parashar, 
   * published on the website https://css-tricks.com on the 7th of May, 2014.
   * Couple of changes were made to the original code to make it compatible 
   * with the `al-foio` theme.
   */
  const progressBar = $("#progress");
  /*
   * We set up the bar after all elements are done loading.
   * In some cases, if the images in the page are larger than the intended
   * size they'll have on the page, they'll be resized via CSS to accomodate
   * the desired size. This mistake, however, breaks the computations as the
   * scroll size is computed as soon as the elements finish loading.
   * To account for this, a minimal delay was introduced before computing the
   * values.
   */
  window.onload = function () {
    setTimeout(progressBarSetup, 50);
  };
  /*
   * We set up the bar according to the browser.
   * If the browser supports the progress element we use that.
   * Otherwise, we resize the bar thru CSS styling
   */
  function progressBarSetup() {
    if ("max" in document.createElement("progress")) {
      initializeProgressElement();
      $(document).on("scroll", function() {
        progressBar.attr({ value: getCurrentScrollPosition() });
      });
      $(window).on("resize", initializeProgressElement);
    } else {
      resizeProgressBar();
      $(document).on("scroll", resizeProgressBar);
      $(window).on("resize", resizeProgressBar);
    }
  }
  /*
   * The vertical scroll position is the same as the number of pixels that
   * are hidden from view above the scrollable area. Thus, a value > 0 is
   * how much the user has scrolled from the top
   */
  function getCurrentScrollPosition() {
    return $(window).scrollTop();
  }

  function initializeProgressElement() {
    let navbarHeight = $("#navbar").outerHeight(true);
    $("body").css({ "padding-top": navbarHeight });
    $("progress-container").css({ "padding-top": navbarHeight });
    progressBar.css({ top: navbarHeight });
    progressBar.attr({
      max: getDistanceToScroll(),
      value: getCurrentScrollPosition(),
    });
  }
  /*
   * The offset between the html document height and the browser viewport
   * height will be greater than zero if vertical scroll is possible.
   * This is the distance the user can scroll
   */
  function getDistanceToScroll() {
    return $(document).height() - $(window).height();
  }

  function resizeProgressBar() {
    progressBar.css({ width: getWidthPercentage() + "%" });
  }
  // The scroll ratio equals the percentage to resize the bar
  function getWidthPercentage() {
    return (getCurrentScrollPosition() / getDistanceToScroll()) * 100;
  }
</script>
